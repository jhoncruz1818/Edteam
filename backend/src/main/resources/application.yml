spring:
  application:
    name: edteam-backend
  profiles:
    active: local
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=Apputp;encrypt=true;trustServerCertificate=true
    username: ${DB_USER:edteam_app}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"
  firebase:
    project-id: apputp-3adb7
    credentials-path: ${FIREBASE_CREDENTIALS:}
    verify-tokens: ${FIREBASE_VERIFY_TOKENS:false}

logging:
  level:
    com.edteam.backend: INFO
