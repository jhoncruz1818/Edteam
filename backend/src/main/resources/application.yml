spring:
  application:
    name: edteam-backend
  datasource:
    url: jdbc:mysql://localhost:3306/Apputp?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  cors:
    allowed-origins: "*"
  firebase:
    project-id: apputp-3adb7
    # Ruta al JSON de cuenta de servicio. Si está vacío, se usa modo local (solo desarrollo).
    credentials-path: ${FIREBASE_CREDENTIALS:}
    # true = verifica tokens con Firebase Admin. false = decodifica el JWT sin verificar (solo local).
    verify-tokens: ${FIREBASE_VERIFY_TOKENS:false}

logging:
  level:
    com.edteam.backend: INFO
